<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>MyLocalTon Admin Portal</title>
  <link href="style.css" rel="stylesheet">
</head>
<body>
<div class="portal-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>MyLocalTon</h1>
      <p>Admin Portal</p>
    </div>
    <div class="service-list" id="service-list"></div>
    <div class="spam-panel">
      <label class="spam-toggle">
        <input id="spam-toggle" type="checkbox">
        <span>Run spam</span>
      </label>
      <div class="spam-form" id="spam-form" hidden>
        <label>
          <span>SPAM_CHAINS</span>
          <input id="spam-chains" inputmode="numeric" min="1" max="255" type="number" value="10">
        </label>
        <label>
          <span>SPAM_HOPS</span>
          <input id="spam-hops" inputmode="numeric" min="1" max="65535" type="number" value="65535">
        </label>
        <label>
          <span>SPAM_SPLIT_HOPS</span>
          <input id="spam-split-hops" inputmode="numeric" min="0" max="255" type="number" value="7">
        </label>
        <label>
          <span>SPAM_DURATION_MINUTES</span>
          <input id="spam-duration-minutes" inputmode="numeric" min="1" max="525600" type="number" value="300">
        </label>
        <button class="spam-run-btn" id="spam-run-btn" type="button">Run</button>
      </div>
    </div>
  </aside>

  <main class="viewer">
    <div class="viewer-header">
      <div>
        <h2 id="viewer-title">Select a service</h2>
        <p id="viewer-subtitle">Choose a service from the menu to open its main page.</p>
      </div>
      <a class="open-external" href="#" id="open-external" rel="noopener noreferrer" target="_blank">Open in new tab</a>
    </div>

    <div class="status-banner" id="status-banner"></div>

    <div class="viewer-placeholder" id="viewer-placeholder">
      Select a running service to preview it here.
    </div>
    <iframe class="service-frame" id="service-frame" title="Service View"></iframe>
  </main>
</div>

<script src="script.js"></script>
</body>
</html>
