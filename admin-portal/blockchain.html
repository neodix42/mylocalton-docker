<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>TON Blockchain Status</title>
  <link href="blockchain.css" rel="stylesheet">
</head>
<body>
<div class="container">
  <header class="header-row">
    <div>
      <h1>Local TON Blockchain</h1>
      <p>Genesis and other nodes</p>
    </div>
    <div class="header-actions">
      <button class="bulk-node-btn start-all-btn" id="start-all-btn" type="button">Start all nodes</button>
      <button class="bulk-node-btn stop-all-btn" id="stop-all-btn" type="button">Stop all nodes</button>
      <button class="add-node-btn" id="add-node-btn" type="button">Add node</button>
      <button class="bulk-node-btn cleanup-btn" id="cleanup-btn" type="button">Clean up</button>
    </div>
  </header>

  <div class="status-banner" id="status-banner"></div>

  <table class="status-table">
    <thead>
    <tr>
      <th>Node</th>
      <th>Status</th>
      <th>Health</th>
      <th>Details</th>
      <th>Action</th>
    </tr>
    </thead>
    <tbody id="nodes-body"></tbody>
  </table>
</div>

<div aria-hidden="true" class="logs-modal" id="logs-modal">
  <div aria-labelledby="logs-modal-title" aria-modal="true" class="logs-modal-card" role="dialog">
    <div class="logs-modal-header">
      <h2 id="logs-modal-title">Service logs</h2>
      <button class="logs-modal-close" id="logs-modal-close" type="button">Close</button>
    </div>
    <pre class="logs-modal-content" id="logs-modal-content">No logs loaded.</pre>
  </div>
</div>

<div aria-hidden="true" class="confirm-modal" id="cleanup-modal">
  <div aria-labelledby="cleanup-modal-title" aria-modal="true" class="confirm-modal-card" role="dialog">
    <h2 id="cleanup-modal-title">Clean up</h2>
    <p class="confirm-modal-text">
      Are you sure you want to clean up? This will stop and remove all containers and delete all volumes, and only the Admin portal stays running. This action cannot be undone.
    </p>
    <div class="confirm-modal-actions">
      <button class="confirm-btn cancel" id="cleanup-cancel-btn" type="button">Cancel</button>
      <button class="confirm-btn yes" id="cleanup-confirm-btn" type="button">Yes</button>
    </div>
  </div>
</div>

<script src="blockchain.js"></script>
</body>
</html>
